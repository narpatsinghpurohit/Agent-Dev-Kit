packages:
  - apps/*
  - packages/*

# Build scripts are opt-in (pnpm 11). Only these packages may run postinstall:
# lefthook installs git hooks; the rest ship native binaries.
allowBuilds:
  lefthook: true
  '@node-rs/argon2': true
  '@swc/core': true
  '@tailwindcss/oxide': true
  esbuild: true
  mongodb-memory-server: true
  msw: true
  # Analytics/telemetry postinstall — deliberately blocked.
  '@scarf/scarf': false

# Single source of truth for dependency versions (verified 2026-07-03).
# Every workspace package references these via the `catalog:` protocol;
# syncpack lint fails CI when a package pins its own diverging version.
catalog:
  # --- web ---
  react: 19.2.7
  react-dom: 19.2.7
  '@types/react': ^19.2.17
  '@types/react-dom': ^19.2.3
  vite: ^8.1.3
  '@vitejs/plugin-react': ^6.0.3
  '@tanstack/react-router': ^1.170.17
  '@tanstack/router-plugin': ^1.168.19
  '@tanstack/react-router-devtools': ^1.170.17
  '@tanstack/react-query': ^5.101.2
  '@tanstack/react-query-devtools': ^5.101.2
  '@tanstack/react-form': ^1.33.0
  tailwindcss: ^4.3.2
  '@tailwindcss/vite': ^4.3.2

  # --- api (NestJS) ---
  '@nestjs/common': ^11.1.27
  '@nestjs/core': ^11.1.27
  '@nestjs/platform-express': ^11.1.27
  '@nestjs/config': ^4.0.4
  '@nestjs/mongoose': ^11.0.4
  '@nestjs/swagger': ^11.4.5
  '@nestjs/jwt': ^11.0.2
  '@nestjs/throttler': ^6.5.0
  '@nestjs/cli': ^11.0.23
  '@nestjs/schematics': ^11.1.0
  '@nestjs/testing': ^11.1.27
  mongoose: ^9.7.3
  nestjs-zod: ^5.4.0
  nestjs-pino: ^4.6.1
  pino: ^10.3.1
  pino-http: ^11.0.0
  pino-pretty: ^13.1.3
  '@node-rs/argon2': ^2.0.2
  helmet: ^8.2.0
  cookie-parser: ^1.4.7
  '@types/cookie-parser': ^1.4.10
  '@types/express': ^5.0.6
  multer: ^2.2.0
  '@types/multer': ^2.2.0
  reflect-metadata: ^0.2.2
  rxjs: ^7.8.2

  # --- AI (matched major set: ai@7 <-> @ai-sdk/react@4; do not mix majors) ---
  ai: ^7.0.14
  '@ai-sdk/provider': ^4.0.2
  '@ai-sdk/google': ^4.0.8
  '@ai-sdk/amazon-bedrock': ^5.0.10
  '@ai-sdk/react': ^4.0.15

  # --- shared runtime ---
  zod: ^4.4.3

  # --- codegen ---
  orval: ^8.19.0

  # --- testing ---
  vitest: ^4.1.9
  '@vitest/coverage-v8': ^4.1.9
  '@testing-library/react': ^16.3.2
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/user-event': ^14.6.1
  happy-dom: ^20.10.6
  msw: ^2.14.6
  '@playwright/test': ^1.61.1
  supertest: ^7.2.2
  '@types/supertest': ^7.2.0
  mongodb-memory-server: ^11.2.0
  unplugin-swc: ^1.5.9
  '@swc/core': ^1.15.43

  # --- tooling ---
  typescript: ~6.0.3
  tsx: ^4.22.5
  tsup: ^8.5.1
  '@types/node': ^22
  eslint: ^10.6.0
  '@eslint/js': ^10.0.1
  typescript-eslint: ^8.62.1
  '@eslint-react/eslint-plugin': ^5.10.2
  eslint-plugin-react-hooks: ^7.1.1
  eslint-plugin-boundaries: ^6.0.2
  '@eslint-community/eslint-plugin-eslint-comments': ^4.7.2
  eslint-config-prettier: ^10.1.8
  globals: ^17.7.0
  prettier: ^3.9.4
  turbo: ^2.10.2
  syncpack: ^15.3.2
  lefthook: ^2.1.9
  '@commitlint/cli': ^21.2.0
  '@commitlint/config-conventional': ^21.2.0

minimumReleaseAgeExclude:
  - '@eslint-react/ast@5.10.2'
  - '@eslint-react/core@5.10.2'
  - '@eslint-react/eslint-plugin@5.10.2'
  - '@eslint-react/eslint@5.10.2'
  - '@eslint-react/jsx@5.10.2'
  - '@eslint-react/shared@5.10.2'
  - '@eslint-react/var@5.10.2'
  - eslint-plugin-react-dom@5.10.2
  - eslint-plugin-react-jsx@5.10.2
  - eslint-plugin-react-naming-convention@5.10.2
  - eslint-plugin-react-rsc@5.10.2
  - eslint-plugin-react-web-api@5.10.2
  - eslint-plugin-react-x@5.10.2
  - '@ai-sdk/amazon-bedrock@5.0.10'
  - '@ai-sdk/anthropic@4.0.7'
  - '@ai-sdk/gateway@4.0.11'
  - '@ai-sdk/google@4.0.8'
  - '@ai-sdk/openai@4.0.7'
  - '@ai-sdk/provider-utils@5.0.5'
  - '@ai-sdk/provider@4.0.2'
  - ai@7.0.14
