# Local MongoDB as a single-node replica set so transactions and change
# streams behave exactly as in production. The healthcheck initiates the
# replica set with host localhost:27017 (not the container hostname) so the
# host machine can connect; pair with directConnection=true in MONGODB_URI.
services:
  mongo:
    image: mongo:8.0
    command: ['--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "try { rs.status().ok } catch (e) {
        rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}).ok }"
      interval: 5s
      timeout: 10s
      retries: 12

volumes:
  mongo-data:
